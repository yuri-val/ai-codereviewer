name: "Magic Review: OPENAI Code Review Action"
description: "Perform code reviews and comment on diffs using OpenAI API."
inputs:
  GITHUB_TOKEN:
    description: "GitHub token to interact with the repository."
    required: true
  OPENAI_API_KEY:
    description: "OpenAI API key for GPT."
    required: true
  OPENAI_API_MODEL:
    description: "OpenAI API model."
    required: false
    # gpt-5.6-luna isn't available to this OpenAI org yet (model_not_found);
    # gpt-5.4-mini is the closest accessible efficient model. Bump to
    # gpt-5.6-luna here once the org has access — no code change needed.
    default: "gpt-5.4-mini"
  exclude:
    description: "Glob patterns to exclude files from the diff analysis"
    required: false
    default: ""
runs:
  using: "node20"
  main: "dist/index.js"
branding:
  icon: "aperture"
  color: "green"
